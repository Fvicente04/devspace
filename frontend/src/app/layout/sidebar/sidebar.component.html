<aside class="sidebar">
  <div class="logo-section">
    <div class="logo">Dev <span>Space</span></div>
    <div class="subtitle">// developer dashboard</div>
  </div>

  <nav class="nav-section">
    <div class="nav-label">workspace</div>
    @for (item of nav; track item.label) {
      @if (item.route) {
        <a class="nav-item" [class.active]="isActive(item.route)" [routerLink]="item.route">
          <svg viewBox="0 0 24 24" aria-hidden="true">
            <path [attr.d]="item.icon"></path>
          </svg>
          <span>{{ item.label }}</span>
        </a>
      } @else {
        <button class="nav-item" type="button" (click)="scrollToCard(item.anchor!)">
          <svg viewBox="0 0 24 24" aria-hidden="true">
            <path [attr.d]="item.icon"></path>
          </svg>
          <span>{{ item.label }}</span>
        </button>
      }
    }
  </nav>

  <div class="user-section">
    <div class="avatar">{{ initials() }}</div>
    <div class="user-info">
      <div class="display-name">{{ displayName() }}</div>
      <div class="handle">{{ handle() }}</div>
    </div>
    <button class="logout-btn" type="button" data-testid="logout-btn" (click)="logout()" aria-label="Logout" title="Logout">
      <svg viewBox="0 0 24 24" aria-hidden="true">
        <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4M16 17l5-5-5-5M21 12H9"/>
      </svg>
    </button>
  </div>
</aside>
